# OSS-Fuzz project configuration for libmongocrypt
# See https://google.github.io/oss-fuzz/getting-started/new-project-guide/

homepage: "https://github.com/mongodb/libmongocrypt"
language: c
primary_contact: "security@mongodb.com"
auto_ccs:
  - "your-team@mongodb.com"

# Sanitizers to run
sanitizers:
  - address
  - undefined
  - memory

# Fuzzing engines
fuzzing_engines:
  - libfuzzer
  - afl
  - honggfuzz

# Build configuration
main_repo: "https://github.com/mongodb/libmongocrypt.git"

